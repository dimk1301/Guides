<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Developer's Guide to DevSecOps</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
  <style>
    :root {
      /* Colors */
      --bg: #0A0E17;
      --panel: #111826;
      --panel-alt: #161F30;
      --border: #25314A;
      --border-soft: #1B2434;
      --text: #EAEEF7;
      --text-muted: #95A1BC;
      --text-faint: #5A6480;

      /* Pipeline colors */
      --p1: #334155;
      --p2: #64748B;
      --p3: #3B82F6;
      --p4: #F59E0B;
      --p5: #F97316;
      --p6: #84CC16;
      --p7: #6366F1;
      --p8: #10B981;
      --p9: #EF4444;
      --p10: #8B5CF6;
      --p11: #22D3EE;
      --p12: #92400E;

      --accent: #4C7EF3;
      --amber: #F0B429;

      /* Typography & spacing */
      --radius: 10px;
      --display: 'Inter', system-ui, sans-serif;
      --sans: 'Inter', system-ui, sans-serif;
      --mono: 'JetBrains Mono', ui-monospace, monospace;

      --space-xs: 0.5rem;
      --space-sm: 0.75rem;
      --space-md: 1rem;
      --space-lg: 1.5rem;
      --space-xl: 2rem;
      --space-2xl: 3rem;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      background:
        radial-gradient(1100px 550px at 88% -8%, rgba(76, 126, 243, 0.08), transparent 60%),
        radial-gradient(900px 480px at -8% 12%, rgba(99, 102, 241, 0.08), transparent 55%),
        var(--bg);
      color: var(--text);
      font-family: var(--sans);
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
    }

    a {
      color: var(--accent);
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
    }

    ::selection {
      background: rgba(76, 126, 243, 0.28);
    }

    /* Progress bar */
    #progress {
      position: fixed;
      top: 0;
      left: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--p3), var(--accent), var(--p10));
      z-index: 100;
      width: 0%;
      transition: width 0.1s linear;
    }

    /* Layout */
    .shell {
      display: grid;
      grid-template-columns: 272px 1fr;
      max-width: 1320px;
      margin: 0 auto;
    }

    .sidebar {
      position: sticky;
      top: 0;
      align-self: start;
      height: 100vh;
      overflow-y: auto;
      padding: var(--space-xl) var(--space-md) var(--space-2xl);
      border-right: 1px solid var(--border-soft);
    }

    .sidebar::-webkit-scrollbar {
      width: 6px;
    }
    .sidebar::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 4px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      margin-bottom: var(--space-xl);
      padding-left: 4px;
    }

    .brand-mark {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      flex: none;
      background: conic-gradient(from 200deg, var(--p3), var(--p6), var(--p9), var(--p11), var(--p3));
      box-shadow: 0 0 0 1
